services:
  - type: web
    name: noticeboard-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard (keep secret)
      - key: PORT
        value: 3000
      - key: REACT_URL
        sync: false          # fill after React Vercel deploy (e.g. https://noticeboard-react.vercel.app)
      - key: ANGULAR_URL
        sync: false          # fill after Angular Vercel deploy
    healthCheckPath: /
    autoDeploy: true
